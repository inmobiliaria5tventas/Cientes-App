    <style>

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
        header { position:absolute; top:0; left:0; right:0; z-index:1000; padding:20px; background:linear-gradient(rgba(2,6,23,0.95), transparent); pointer-events:none; }
        .header-content { pointer-events:auto; display:flex; align-items:center; gap:16px; }

        .overlay.active { opacity:1; pointer-events:auto; }
        #info-panel { position:fixed; bottom:0; left:0; right:0; z-index:1020; background:var(--surface); border-top:1px solid rgba(255,255,255,0.1); border-radius:24px 24px 0 0; padding:16px 20px; padding-bottom:max(20px, env(safe-area-inset-bottom)); transform:translateY(100%); transition:transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); max-width:450px; margin:0 auto; box-shadow:0 -10px 40px rgba(0,0,0,0.6); }
        #info-panel.active { transform:translateY(0); }
        @media (min-width:1024px) { #info-panel { top:20px; bottom:auto; right:20px; left:auto; width:340px; border-radius:20px; transform:translateX(120%); border:1px solid rgba(255,255,255,0.1); margin:0; padding-bottom:20px; } #info-panel.active { transform:translateX(0); } .overlay { display:none; } }
        .handle { width:36px; height:4px; background:rgba(255,255,255,0.15); border-radius:2px; margin:-4px auto 16px; }

        .panel-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }

        .status-pill { padding:4px 12px; border-radius:20px; font-size:11px; font-weight:800; text-transform:uppercase; margin-top:5px; display:inline-block; }
        .st-disponible { background:rgba(34,197,94,0.15); color:var(--success); }
        .st-reservada { background:rgba(234,179,8,0.15); color:var(--warning); }
        .st-vendida { background:rgba(239,68,68,0.15); color:var(--danger); }
        .close-btn { background:rgba(255,255,255,0.08); border:none; color:#fff; width:36px; height:36px; border-radius:12px; cursor:pointer; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 14px; }
        .stat-card label { display: block; font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 2px; letter-spacing: 0.5px; }
        .stat-card span { font-size: 16px; font-weight: 700; color: #fff; }

        .img-container { width: 100%; height: 160px; background: rgba(0,0,0,0.2); border-radius: 16px; margin-bottom: 16px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .img-container .no-img { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); font-size: 11px; gap: 8px; }
        .img-container .no-img i { font-size: 24px; opacity: 0.3; }

        .photo-link { display: none; margin-top: 12px; background: rgba(255,255,255,0.05); color: #fff; text-decoration: none; padding: 10px; border-radius: 12px; font-size: 13px; font-weight: 600; text-align: center; border: 1px solid rgba(255,255,255,0.1); align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .photo-link:hover { background: rgba(255,255,255,0.1); }


        .lote-label { background:transparent!important; border:none!important; box-shadow:none!important; color:white!important; font-weight:800!important; font-size:10px!important; text-shadow:0 0 4px #000; pointer-events:none!important; }

        .locate-btn { position: absolute; top: 110px; right: 20px; z-index: 1000; width: 44px; height: 44px; background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: 0.3s; }

251,-36.122536034480035],[-71.777147319,-36.122943113599987],[-71.777548520500005,-36.122423326399996]]]}}]}
        const lotesData = {
            "type": "FeatureCollection",
            "features": [
                ...(typeof json_Disponibles_2 !== 'undefined' ? json_Disponibles_2.features : []),
                ...(typeof json_Vendidas_3 !== 'undefined' ? json_Vendidas_3.features : []),
                ...(typeof json_Reservadas_4 !== 'undefined' ? json_Reservadas_4.features : [])
            ].filter(f => f.geometry && f.geometry.coordinates && f.geometry.coordinates.length > 0)
        };

        const map = L.map('map', { center: [-36.120, -71.777], zoom: 16 });
        L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { 
            maxZoom: 20, 
            attribution: 'Google Hybrid' 
        }).addTo(map);

        const colors = { 
            'disponible': '#2ecc71', 
            'reservada': '#f1c40f', 
            'vendida': '#e74c3c',
            'vendido': '#e74c3c'
        };

        function getStyle(f) {
            const e = (f.properties.Estado || f.properties.estado || 'Disponible').toLowerCase();
            return { 
                fillColor: colors[e] || '#2ecc71', 
                weight: 2, 
                opacity: 1, 
                color: 'white', 
                fillOpacity: 0.7 
            };
        }

        const gjLayer = L.geoJSON(lotesData, {
            style: getStyle,
            onEachFeature: (f, l) => {
                const id = f.properties.Lote || f.properties.fid || '--';
                l.bindTooltip(String(id), { 
                    permanent: true, 
                    direction: 'center', 
                    className: 'lote-label' 
                });
                l.on('click', (e) => {
                    showInfo(f.properties, e.target.getBounds());
                    L.DomEvent.stopPropagation(e);
                });
            }
        }).addTo(map);
        
        if (lotesData.features.length > 0) {
            map.fitBounds(gjLayer.getBounds(), { padding: [50, 50] });
        }

        let userMarker, userCircle;
        function locateUser() {
            map.locate({ setView: true, maxZoom: 17, enableHighAccuracy: true });
        }

        map.on('locationfound', (e) => {
            const radius = e.accuracy / 2;
            if (userMarker) { map.removeLayer(userMarker); map.removeLayer(userCircle); }
            
            userCircle = L.circle(e.latlng, radius, { color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.15, weight: 1 }).addTo(map);
            userMarker = L.circleMarker(e.latlng, { radius: 6, fillColor: '#3b82f6', color: '#fff', weight: 2, opacity: 1, fillOpacity: 1 }).addTo(map);
        });

        map.on('locationerror', (e) => {
            alert("No se pudo obtener tu ubicación. Asegúrate de dar permisos de GPS a tu navegador.");
        });

        function showInfo(p, bounds) {
            const id = p.Lote || p.fid;
            document.getElementById('l-id').innerText = 'Lote ' + id;
            document.getElementById('l-area').innerText = p.Area || p.superficie || '5.000 m²';
            document.getElementById('l-price').innerText = p.Precio || p.precio || '$ --';
            
            const b = document.getElementById('l-status');
            const est = (p.Estado || p.estado || 'Disponible').toLowerCase();
            b.innerText = est.charAt(0).toUpperCase() + est.slice(1);
            b.className = 'status-pill st-' + est;

            // Foto e Imagen dinámica basada en ID o propiedad
            const img = document.getElementById('l-img');
            const noImg = document.querySelector('.no-img');
            
            // Intentar cargar la foto por ID primero, luego por propiedad, si no, placeholder
            const idFoto = `El_Copihue/images/Fotos%20comprimidas/${id}.jpg`;
            const fotoUrl = p.foto || p.link_foto || p.imagen;
            
            // Usamos una función para verificar si la imagen existe o simplemente la asignamos
            // En este caso, la asignamos y manejamos el error si no existe
            img.onerror = () => {
                if (!fotoUrl) {
                    img.style.display = 'none';
                    noImg.style.display = 'flex';
                } else if (img.src !== fotoUrl) {
                    img.src = fotoUrl;
                }
            };

            img.src = idFoto;
            img.style.display = 'block';
            noImg.style.display = 'none';

            // Enlace de fotos (carpeta)
            const photoLink = document.getElementById('l-photo-link');
            const folderUrl = p.link_fotos || p.carpeta_fotos || p.link_terreno;
            if (folderUrl) {
                photoLink.href = folderUrl;
                photoLink.style.display = 'flex';
            } else {
                photoLink.style.display = 'none';
            }
            
            document.getElementById('info-panel').classList.add('active');

            document.getElementById('overlay').classList.add('active');
            map.fitBounds(bounds, { padding: [20, 20], maxZoom: 18 });
        }

        function closePanel() {
            document.getElementById('info-panel').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }
        map.on('click', closePanel);

        // Agregar Leyenda
        const legend = L.control({position: 'bottomleft'});
        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'info legend');
            div.style.background = 'rgba(15, 23, 42, 0.9)';
            div.style.padding = '10px';
            div.style.borderRadius = '12px';
            div.style.color = 'white';
            div.style.fontSize = '12px';
            div.style.border = '1px solid rgba(255,255,255,0.1)';
            div.style.marginBottom = '20px';
            div.innerHTML = `
                <div style="display:flex;align-items:center;margin-bottom:5px"><span style="width:12px;height:12px;background:#2ecc71;display:inline-block;margin-right:8px;border-radius:3px"></span> Disponible</div>
                <div style="display:flex;align-items:center;margin-bottom:5px"><span style="width:12px;height:12px;background:#f1c40f;display:inline-block;margin-right:8px;border-radius:3px"></span> Reservado</div>
                <div style="display:flex;align-items:center"><span style="width:12px;height:12px;background:#e74c3c;display:inline-block;margin-right:8px;border-radius:3px"></span> Vendido</div>
            `;
            return div;
        };
        legend.addTo(map);


    </script>
